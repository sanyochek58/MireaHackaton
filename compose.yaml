services:
  postgres:
    image: 'postgres:17-alpine'
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - OPENSTACK_BASE_URL=${OPENSTACK_BASE_URL}
      - OPENSTACK_PROJECT_ID=${OPENSTACK_PROJECT_ID}
      - OPENSTACK_DOMAIN=${OPENSTACK_DOMAIN}
      - OPENSTACK_USERNAME=${OPENSTACK_USERNAME}
      - OPENSTACK_PASSWORD=${OPENSTACK_PASSWORD}
      - OPENSTACK_PROJECT_NAME=${OPENSTACK_PROJECT_NAME}
      - OPENSTACK_INSECURE_SSL=${OPENSTACK_INSECURE_SSL}
      - OPENSTACK_DEFAULT_FLAVOR_ID=${OPENSTACK_DEFAULT_FLAVOR_ID}
      - OPENSTACK_DEFAULT_IMAGE_ID=${OPENSTACK_DEFAULT_IMAGE_ID}
      - OPENSTACK_DEFAULT_NETWORK_ID=${OPENSTACK_DEFAULT_NETWORK_ID}
      - OPENSTACK_DEFAULT_SECURITY_GROUP=${OPENSTACK_DEFAULT_SECURITY_GROUP}
      - OPENSTACK_DEFAULT_VOLUME_SIZE_GB=${OPENSTACK_DEFAULT_VOLUME_SIZE_GB}
      - OPENSTACK_POLL_INTERVAL_SECONDS=${OPENSTACK_POLL_INTERVAL_SECONDS}
      - OPENSTACK_MAX_POLL_ATTEMPTS=${OPENSTACK_MAX_POLL_ATTEMPTS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}
      - SYSTEM_CPU_MIN=${SYSTEM_CPU_MIN}
      - SYSTEM_RAM_MIN_GB=${SYSTEM_RAM_MIN_GB}
      - SYSTEM_DISK_MIN_GB=${SYSTEM_DISK_MIN_GB}
      - SYSTEM_DISK_MAX_GB=${SYSTEM_DISK_MAX_GB}
      - SYSTEM_TTL_MIN_HOURS=${SYSTEM_TTL_MIN_HOURS}
      - SYSTEM_TTL_MAX_HOURS=${SYSTEM_TTL_MAX_HOURS}
      - SYSTEM_TTL_DEFAULT_HOURS=${SYSTEM_TTL_DEFAULT_HOURS}
      - SYSTEM_MAX_STANDS_FALLBACK=${SYSTEM_MAX_STANDS_FALLBACK}
      - SYSTEM_METRICS_SNAPSHOT_INTERVAL_MS=${SYSTEM_METRICS_SNAPSHOT_INTERVAL_MS}
      - SYSTEM_METRICS_HISTORY_RETENTION_HOURS=${SYSTEM_METRICS_HISTORY_RETENTION_HOURS}
    healthcheck:
      test: ["CMD-SHELL", "wget -S --spider http://localhost:8080/healthz 2>&1 | grep -q 'HTTP/.* 404'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ENABLE_MSW: ${VITE_ENABLE_MSW}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
